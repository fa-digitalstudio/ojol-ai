<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRYSTAL ADMIN - AI OJOL</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #0062ff;
            --secondary: #00d4ff;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --card-white: rgba(255, 255, 255, 0.98);
            --danger: #ef4444;
            --gray: #64748b;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-light); 
            background-image: radial-gradient(at 0% 0%, rgba(0, 98, 255, 0.05) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(0, 212, 255, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh; 
            padding: 16px;
        }

        /* Header & Menu */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 520px;
            margin: 0 auto 20px;
            position: relative;
        }

        .menu-toggle {
            font-size: 26px;
            cursor: pointer;
            padding: 8px 12px;
            color: var(--text-main);
            border-radius: 8px;
            transition: background 0.2s;
        }
        .menu-toggle:hover {
            background: #f1f5f9;
        }

        .menu-dropdown {
            position: absolute;
            top: 45px;
            right: 0;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            width: 220px;
            z-index: 100;
            display: none;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .menu-dropdown a {
            display: block;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--text-main);
            font-size: 15px;
            transition: background 0.2s;
        }

        .menu-dropdown a:hover {
            background: #f1f5f9;
        }

        /* Kartu Utama */
        .card, #login-overlay { 
            background: var(--card-white); 
            padding: clamp(24px, 5vw, 36px); 
            border-radius: 24px; 
            width: 100%; 
            max-width: 520px; 
            margin: 0 auto;
            border: 1px solid #e2e8f0; 
            box-shadow: var(--shadow);
            position: relative;
            z-index: 5;
        }

        .card { display: none; }

        h2 { 
            font-weight: 800; 
            font-size: clamp(18px, 5vw, 22px); 
            text-align: center; 
            margin-bottom: 24px; 
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            line-height: 1.3;
        }

        .status-box { 
            padding: 14px; 
            border-radius: 12px; 
            margin-bottom: 24px; 
            text-align: center; 
            font-size: clamp(11px, 2.5vw, 12px); 
            font-weight: 700; 
            background: #f1f5f9; 
            color: #64748b;
        }

        .status-online { background: #f0fdf4 !important; color: #16a34a !important; }

        .input-group { margin-bottom: 20px; }
        
        label { 
            display: block; 
            font-size: clamp(10px, 2.5vw, 11px); 
            font-weight: 800; 
            color: #94a3b8; 
            margin-bottom: 8px; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .input-wrapper { 
            display: flex; 
            gap: 10px; 
            align-items: center; 
            width: 100%; 
            flex-wrap: wrap;
        }

        input, select { 
            flex: 1 1 200px; 
            padding: 14px; 
            background: #ffffff !important;
            border: 2px solid #e2e8f0; 
            border-radius: 12px; 
            font-family: 'JetBrains Mono', monospace; 
            font-size: clamp(13px, 3vw, 14px); 
            min-width: 0;
        }

        input:focus { border-color: var(--primary); outline: none; }

        .password-container {
            position: relative;
            display: flex;
            align-items: center;
            width: 100%;
        }
        .toggle-password {
            position: absolute;
            right: 16px;
            cursor: pointer;
            color: #94a3b8;
            font-size: 20px;
            z-index: 10;
            user-select: none;
        }

        .check-btn {
            padding: 14px 16px; 
            background: #f1f5f9; 
            border: none; 
            border-radius: 12px;
            color: var(--primary); 
            font-size: clamp(11px, 2.5vw, 12px); 
            font-weight: 700; 
            cursor: pointer;
            transition: 0.2s; 
            white-space: nowrap;
            flex-shrink: 0;
        }
        .check-btn:hover { background: #e2e8f0; }

        .switch {
            position: relative; 
            display: inline-block; 
            width: 44px; 
            height: 24px; 
            flex-shrink: 0; 
            cursor: pointer;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; 
            cursor: pointer; 
            top: 0; 
            left: 0; 
            right: 0; 
            bottom: 0;
            background-color: #cbd5e1; 
            transition: .4s; 
            border-radius: 24px;
        }
        .slider:before {
            position: absolute; 
            content: ""; 
            height: 18px; 
            width: 18px; 
            left: 3px; 
            bottom: 3px;
            background-color: white; 
            transition: .4s; 
            border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }

        .save-btn { 
            width: 100%; 
            padding: 16px; 
            margin-top: 12px; 
            border-radius: 14px;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            border: none; 
            font-weight: 700; 
            font-size: clamp(14px, 3vw, 15px);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .save-btn:active { transform: scale(0.98); }

        .logout-btn {
            width: 100%; 
            padding: 14px; 
            margin-top: 16px; 
            border-radius: 12px;
            background: transparent; 
            color: var(--danger); 
            border: 2px solid var(--danger);
            font-weight: 700; 
            font-size: clamp(14px, 3vw, 15px);
            cursor: pointer; 
            transition: 0.3s;
        }
        .logout-btn:hover { background: var(--danger); color: white; }

        .remember-me {
            display: flex; 
            align-items: center; 
            gap: 10px; 
            margin-top: 12px; 
            font-size: clamp(12px, 2.8vw, 13px); 
            color: #64748b;
        }
        .remember-me input { flex: none; width: 18px; height: 18px; cursor: pointer; }

        /* SweetAlert2 Responsif */
        .swal2-popup {
            border-radius: 20px !important;
            padding: clamp(1.5em, 4vw, 2em) !important;
            font-family: 'Plus Jakarta Sans', sans-serif !important;
            width: 95% !important;
            max-width: 550px !important;
        }
        .swal2-title {
            font-weight: 800 !important;
            color: var(--text-main) !important;
            font-size: clamp(18px, 4vw, 22px) !important;
        }
        .swal2-confirm {
            background: linear-gradient(135deg, var(--primary), var(--secondary)) !important;
            border-radius: 10px !important;
            padding: 12px 24px !important;
            font-weight: 700 !important;
            font-size: clamp(14px, 3vw, 15px) !important;
        }
        .swal2-styled.swal2-confirm:focus {
            box-shadow: 0 0 0 3px rgba(0, 98, 255, 0.3) !important;
        }

        /* Tabel Responsif */
        .table-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            margin-top: 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .history-table {
            width: 100%;
            min-width: 550px;
            border-collapse: collapse;
            font-size: clamp(11px, 2.5vw, 12px);
        }
        .history-table th, .history-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
            word-break: break-word;
        }
        .history-table th {
            background: #f8fafc;
            font-weight: 700;
            white-space: nowrap;
        }
        .action-btn {
            padding: 6px 8px;
            border: none;
            border-radius: 6px;
            font-size: clamp(10px, 2.2vw, 11px);
            cursor: pointer;
            margin: 2px;
            font-weight: 600;
        }
        .edit { background: #3b82f6; color: white; }
        .block { background: #f59e0b; color: white; }
        .delete { background: var(--danger); color: white; }
        .add-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: clamp(12px, 2.8vw, 13px);
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 12px;
            width: 100%;
            max-width: 200px;
        }

        /* Khusus Layar Lebih Besar */
        @media (min-width: 768px) {
            body {
                padding: 32px;
            }
            .page-header {
                max-width: 600px;
            }
            .card, #login-overlay {
                max-width: 600px;
            }
            .input-wrapper {
                flex-wrap: nowrap;
            }
            .add-btn {
                width: auto;
            }
        }
    </style>
</head>
<body>

<!-- Header dengan Menu Garis Tiga -->
<div class="page-header">
    <div></div>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <div class="menu-dropdown" id="main-menu">
        <a href="#" onclick="openUserManager()">👤 Kelola Pengguna</a>
    </div>
</div>

<!-- LOGIN -->
<div id="login-overlay">
    <h2>FARID ARIS</h2>
    <div class="status-box">Security Protocol Level 1</div>
    <div class="input-group">
        <label>Hanya farid yang tahu passwordnya😎</label>
        <div class="password-container">
            <input id="admin_pass" placeholder="Enter password..." type="password"/>
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>
    </div>
    <div class="remember-me">
        <input id="remember_pass" type="checkbox"/>
        <label for="remember_pass" style="text-transform: none; color: inherit; font-weight: 600; margin-bottom: 0;">Simpan password di perangkat ini</label>
    </div>
    <button class="save-btn" onclick="checkLogin()">Open Dashboard</button>
</div>

<!-- MAIN CARD -->
<div class="card" id="main-dashboard">
    <h2>Admin Dashboard ( FARID ARIS )</h2>
    <div class="status-box" id="db-status">Connecting to node...</div>
    
    <div class="input-group">
        <label>OpenRouter API</label>
        <div class="input-wrapper">
            <input id="or_key" placeholder="Not Set" type="text"/>
            <button class="check-btn" onclick="testAPI('or')">CHECK</button>
            <label class="switch">
                <input id="or_status" type="checkbox"/>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="input-group">
        <label>Groq API</label>
        <div class="input-wrapper">
            <input id="gr_key" placeholder="Not Set" type="text"/>
            <button class="check-btn" onclick="testAPI('gr')">CHECK</button>
            <label class="switch">
                <input id="gr_status" type="checkbox"/>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="input-group">
        <label>Gemini API</label>
        <div class="input-wrapper">
            <input id="gm_key" placeholder="Not Set" type="text"/>
            <button class="check-btn" onclick="testAPI('gm')">CHECK</button>
            <label class="switch">
                <input id="gm_status" type="checkbox"/>
                <span class="slider"></span>
            </label>
        </div>
    </div>

    <div class="input-group">
        <label>Maintenance Control</label>
        <select id="maint_mode">
            <option value="false">🟢 Aktifkan website</option>
            <option value="true">🔴 Maintenance</option>
        </select>
    </div>

    <button class="save-btn" id="update-btn" onclick="updateConfig()">Save Configuration</button>
    <button class="logout-btn" onclick="logout()">Logout System</button>
</div>

<script>
    // Kode asli TETAP UTUH dan TIDAK DIUBAH
    const _0xPR2 = "YWRtaW5vam9sa29sYWth"; 

    window.onload = () => {
        const savedPass = localStorage.getItem('admin_session_key');
        if(savedPass) {
            document.getElementById('admin_pass').value = atob(savedPass);
            document.getElementById('remember_pass').checked = true;
        }
        // Inisialisasi data pengguna jika belum ada
        if(!localStorage.getItem('user_list')) {
            const defaultUser = [{
                id: 1,
                nama: "Farid Aris",
                email: "farid@admin.id",
                password: "adminojolkola",
                status: "Aktif",
                terakhir_login: "Belum ada"
            }];
            localStorage.setItem('user_list', JSON.stringify(defaultUser));
        }
    };

    function togglePassword() {
        const passInput = document.getElementById('admin_pass');
        const icon = document.querySelector('.toggle-password');
        passInput.type = passInput.type === 'password' ? 'text' : 'password';
        icon.innerText = passInput.type === 'password' ? '👁️' : '👀';
    }

    const Toast = Swal.mixin({
        toast: true,
        position: 'top-end',
        showConfirmButton: false,
        timer: 3000,
        timerProgressBar: true,
        didOpen: (toast) => {
            toast.addEventListener('mouseenter', Swal.stopTimer);
            toast.addEventListener('mouseleave', Swal.resumeTimer);
        }
    });

    function checkLogin() {
        const input = document.getElementById('admin_pass').value;
        const remember = document.getElementById('remember_pass').checked;

        if(btoa(input) === _0xPR2) {
            // Update waktu login terakhir
            updateLastLogin("Farid Aris");

            if(remember) {
                localStorage.setItem('admin_session_key', btoa(input));
            } else {
                localStorage.removeItem('admin_session_key');
            }
            
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
            initFirebase();
            Toast.fire({ icon: 'success', title: 'Akses diterima. Selamat datang!' });
        } else {
            Swal.fire({ 
                icon: 'error', 
                title: 'Akses Ditolak', 
                text: 'Kata sandi tidak valid. Silahkan coba lagi.',
                confirmButtonText: 'Coba Lagi',
                showClass: { popup: 'animate__animated animate__shakeX' }
            });
        }
    }

    function logout() {
        Swal.fire({
            title: 'Logout?',
            text: "Sesi akan diakhiri.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, Keluar',
            cancelButtonText: 'Batal'
        }).then((result) => {
            if (result.isConfirmed) {
                document.getElementById('login-overlay').style.display = 'block';
                document.getElementById('main-dashboard').style.display = 'none';
                if(!localStorage.getItem('admin_session_key')) {
                    document.getElementById('admin_pass').value = '';
                }
            }
        });
    }

    document.getElementById('admin_pass').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') checkLogin();
    });

    const firebaseConfig = {
        apiKey: "AIzaSyBj86r9p6TzIc9TmrXAzQX2LRTe8K7Umro",
        authDomain: "ojolai.firebaseapp.com",
        projectId: "ojolai",
        databaseURL: "https://ojolai-default-rtdb.asia-southeast1.firebasedatabase.app",
        storageBucket: "ojolai.firebasestorage.app",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function initFirebase() {
        const statusBox = document.getElementById('db-status');
        db.ref('config').on('value', (snap) => {
            const data = snap.val();
            statusBox.innerText = "System Synced & Secured";
            statusBox.classList.add('status-online');

            if(data) {
                document.getElementById('or_key').value = data.openrouter_key || '';
                document.getElementById('gr_key').value = data.groq_key || '';
                document.getElementById('gm_key').value = data.gemini_key || '';
                document.getElementById('or_status').checked = data.or_active || false;
                document.getElementById('gr_status').checked = data.gr_active || false;
                document.getElementById('gm_status').checked = data.gm_active || false;
                document.getElementById('maint_mode').value = String(data.is_maintenance);
            }
        }, (error) => {
            statusBox.innerText = "System Error: " + error.message;
            statusBox.style.color = "#ef4444";
        });
    }

    async function testAPI(type) {
        const key = document.getElementById(type + '_key').value;
        if(!key) return Toast.fire({ icon: 'info', title: 'API Key masih kosong' });

        Swal.fire({ 
            title: 'Memverifikasi...', 
            html: 'Menghubungkan ke server provider',
            allowOutsideClick: false, 
            didOpen: () => { Swal.showLoading(); } 
        });

        try {
            let url, headers;
            if(type === 'gr') {
                url = 'https://api.groq.com/openai/v1/models';
                headers = { 'Authorization': `Bearer ${key}` };
            } else if(type === 'or') {
                url = 'https://openrouter.ai/api/v1/models';
                headers = { 'Authorization': `Bearer ${key}` };
            } else {
                url = `https://generativelanguage.googleapis.com/v1beta/models?key=${key}`;
            }

            const res = await fetch(url, { headers: headers });
            if(res.ok) {
                Swal.fire({
                    icon: 'success',
                    title: 'Validasi Berhasil',
                    text: 'API Key valid dan siap digunakan!',
                    confirmButtonText: 'Mantap',
                    backdrop: `rgba(0,123,255,0.1)`
                });
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Validasi Gagal',
                    text: 'Key tidak valid atau kuota habis.',
                    confirmButtonText: 'Periksa Kembali'
                });
            }
        } catch (e) {
            Swal.fire('Error', 'Gagal terhubung ke provider API.', 'error');
        }
    }

    function updateConfig() {
        const btn = document.getElementById('update-btn');
        btn.innerText = "Updating...";
        btn.disabled = true;

        const updatedData = {
            openrouter_key: document.getElementById('or_key').value,
            groq_key: document.getElementById('gr_key').value,
            gemini_key: document.getElementById('gm_key').value,
            or_active: document.getElementById('or_status').checked,
            gr_active: document.getElementById('gr_status').checked,
            gm_active: document.getElementById('gm_status').checked,
            is_maintenance: document.getElementById('maint_mode').value === 'true'
        };

        db.ref('config').set(updatedData)
            .then(() => {
                Swal.fire({ 
                    icon: 'success', 
                    title: 'Berhasil Disimpan!', 
                    text: 'Konfigurasi sistem telah diperbarui secara real-time.', 
                    timer: 2000, 
                    showConfirmButton: false,
                    background: '#ffffff',
                    iconColor: '#0062ff'
                });
            })
            .catch((err) => {
                Swal.fire('Error', err.message, 'error');
            })
            .finally(() => {
                btn.innerText = "Save Configuration";
                btn.disabled = false;
            });
    }

    // --- FUNGSI BARU TAMBAHAN ---
    function toggleMenu() {
        const menu = document.getElementById('main-menu');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }

    // Tutup menu jika klik di luar
    document.addEventListener('click', function(e) {
        if(!e.target.matches('.menu-toggle')) {
            document.getElementById('main-menu').style.display = 'none';
        }
    });

    // Update waktu login terakhir
    function updateLastLogin(namaPengguna) {
        const users = JSON.parse(localStorage.getItem('user_list')) || [];
        const waktuSekarang = new Date().toLocaleString('id-ID');
        const updated = users.map(u => u.nama === namaPengguna ? {...u, terakhir_login: waktuSekarang} : u);
        localStorage.setItem('user_list', JSON.stringify(updated));
    }

    // Buka halaman kelola pengguna
    function openUserManager() {
        const users = JSON.parse(localStorage.getItem('user_list')) || [];
        let html = `<button class="add-btn" onclick="addNewUser()">➕ Tambah Pengguna Baru</button>`;
        html += `<div class="table-container">
            <table class="history-table">
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Email</th>
                        <th>Password</th>
                        <th>Status</th>
                        <th>Login Terakhir</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody>`;

        if(users.length === 0) {
            html += `<tr><td colspan="6" style="text-align:center; padding:20px;">Belum ada data pengguna</td></tr>`;
        } else {
            users.forEach(u => {
                html += `
                <tr>
                    <td>${u.nama}</td>
                    <td>${u.email}</td>
                    <td>${u.password}</td>
                    <td>${u.status}</td>
                    <td>${u.terakhir_login}</td>
                    <td>
                        <button class="action-btn edit" onclick="editUser(${u.id})">Ubah</button>
                        <button class="action-btn block" onclick="toggleBlock(${u.id})">${u.status === 'Aktif' ? 'Blokir' : 'Buka'}</button>
                        <button class="action-btn delete" onclick="deleteUser(${u.id})">Hapus</button>
                    </td>
                </tr>`;
            });
        }
        html += `</tbody></table></div>`;

        Swal.fire({
            title: '👤 Kelola Pengguna',
            html: html,
            width: '95%',
            showConfirmButton: true,
            confirmButtonText: 'Tutup'
        });
    }

    // Tambah pengguna baru
    function addNewUser() {
        Swal.fire({
            title: 'Tambah Pengguna Baru',
            html: `
                <div style="text-align:left; margin-top:10px;">
                    <label style="font-size:13px; text-transform:none; margin-bottom:4px;">Nama Lengkap</label>
                    <input id="nama_baru" class="swal2-input" placeholder="Masukkan nama">
                    <label style="font-size:13px; text-transform:none; margin-bottom:4px; margin-top:8px;">Email</label>
                    <input id="email_baru" class="swal2-input" placeholder="Masukkan email">
                    <label style="font-size:13px; text-transform:none; margin-bottom:4px; margin-top:8px;">Password</label>
                    <input id="pass_baru" class="swal2-input" type="password" placeholder="Masukkan password">
                </div>
            `,
            focusConfirm: false,
            preConfirm: () => {
                return {
                    nama: document.getElementById('nama_baru').value.trim(),
                    email: document.getElementById('email_baru').value.trim(),
                    password: document.getElementById('pass_baru').value.trim()
                }
            }
        }).then((result) => {
            if(result.isConfirmed) {
                const {nama, email, password} = result.value;
                if(!nama || !email || !password) {
                    return Toast.fire({icon: 'error', title: 'Semua kolom harus diisi!'});
                }
                const users = JSON.parse(localStorage.getItem('user_list')) || [];
                const newId = users.length ? Math.max(...users.map(u => u.id)) + 1 : 1;
                users.push({
                    id: newId,
                    nama: nama,
                    email: email,
                    password: password,
                    status: "Aktif",
                    terakhir_login: "Belum ada"
                });
                localStorage.setItem('user_list', JSON.stringify(users));
                Toast.fire({icon: 'success', title: 'Pengguna berhasil ditambahkan'});
                openUserManager();
            }
        });
    }

    // Edit data pengguna
    function editUser(userId) {
        const users = JSON.parse(localStorage.getItem('user_list')) || [];
        const user = users.find(u => u.id === userId);
        if(!user) return;

        Swal.fire({
            title: 'Ubah Data Pengguna',
            html: `
                <div style="text-align:left; margin-top:10px;">
                    <label style="font-size:13px; text-transform:none; margin-bottom:4px;">Nama Lengkap</label>
                    <input id="edit_nama" class="swal2-input" value="${user.nama}">
                    <label style="font-size:13px; text-transform:none; margin-bottom:4px; margin-top:8px;">Email</label>
                    <input id="edit_email" class="swal2-input" value="${user.email}">
                    <label style="font-size:13px; text-transform:none; margin-bottom:4px; margin-top:8px;">Password</label>
                    <input id="edit_pass" class="swal2-input" type="password" value="${user.password}">
                </div>
            `,
            focusConfirm: false,
            preConfirm: () => {
                return {
                    nama: document.getElementById('edit_nama').value.trim(),
                    email: document.getElementById('edit_email').value.trim(),
                    password: document.getElementById('edit_pass').value.trim()
                }
            }
        }).then((result) => {
            if(result.isConfirmed) {
                const {nama, email, password} = result.value;
                if(!nama || !email || !password) {
                    return Toast.fire({icon: 'error', title: 'Semua kolom harus diisi!'});
                }
                const updated = users.map(u => u.id === userId ? {...u, nama, email, password} : u);
                localStorage.setItem('user_list', JSON.stringify(updated));
                Toast.fire({icon: 'success', title: 'Data berhasil diperbarui'});
                openUserManager();
            }
        });
    }

    // Blokir / Buka blokir
    function toggleBlock(userId) {
        const users = JSON.parse(localStorage.getItem('user_list')) || [];
        const updated = users.map(u => {
            if(u.id === userId) {
                return {...u, status: u.status === 'Aktif' ? 'Diblokir' : 'Aktif'};
            }
            return u;
        });
        localStorage.setItem('user_list', JSON.stringify(updated));
        Toast.fire({icon: 'info', title: 'Status pengguna diperbarui'});
        openUserManager();
    }

    // Hapus pengguna
    function deleteUser(userId) {
        Swal.fire({
            title: 'Hapus Pengguna?',
            text: "Data akan dihapus permanen!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'Ya, Hapus',
            cancelButtonText: 'Batal'
        }).then((res) => {
            if(res.isConfirmed) {
                const users = JSON.parse(localStorage.getItem('user_list')) || [];
                const filtered = users.filter(u => u.id !== userId);
                localStorage.setItem('user_list', JSON.stringify(filtered));
                Toast.fire({icon: 'success', title: 'Pengguna dihapus'});
                openUserManager();
            }
        });
    }
</script>
</body>
</html>
